name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test_events
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      # Remaining high advisories are Puppeteer/sqlite3 build-chain transitives until scraper stack upgrades
      - name: Audit dependencies
        run: npm audit --audit-level=critical
        working-directory: backend

      - name: Backend typecheck
        run: npm run typecheck
        working-directory: backend

      - name: Backend unit + API + refresh tests
        run: npm run test:unit && npm run test:api && node --test test/refresh.test.js
        working-directory: backend
        env:
          SKIP_GEOCODE: 'true'
          SKIP_EVENT_VALIDATION: 'true'
          SEMANTIC_SEARCH_ENABLED: 'false'
          SKIP_ENV_VALIDATION: 'true'
          REDIS_URL: ''
          API_KEYS: 'test-key'

      - name: Postgres integration tests
        run: node --test test/postgres.integration.test.js
        working-directory: backend
        env:
          TEST_DATABASE_URL: postgresql://test:test@localhost:5432/test_events

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Frontend lint
        run: npm run lint
        working-directory: frontend

      - name: Frontend tests
        run: npm test
        working-directory: frontend

      - name: Frontend build
        run: npm run build
        working-directory: frontend

  semantic:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: Backend semantic tests
        run: npm run test:semantic
        working-directory: backend
        env:
          SKIP_GEOCODE: 'true'
          SKIP_EVENT_VALIDATION: 'true'
